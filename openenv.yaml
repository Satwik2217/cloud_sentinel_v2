spec_version: "1"
name: "cloud_sentinel"
entrypoint: "server.app:app"

metadata:
  domain: "Cybersecurity"
  task_type: "Cloud Infrastructure Remediation"
  description: "A simulation of hardening cloud resources against public exposure and lack of encryption."

tasks:
  - id: "secure-one"
    name: "Secure One Server"
    difficulty: "easy"
    max_steps: 5
    grader:
      type: "deterministic"
      description: "Grader checks if at least one resource has is_public=False and is_encrypted=True. Score is (secured_count / 1.0) capped at 1.0."

  - id: "secure-three"
    name: "Secure Three Servers"
    difficulty: "medium"
    max_steps: 10
    grader:
      type: "deterministic"
      description: "Grader calculates the ratio of hardened servers. Success is reached when 3/5 servers are fully compliant. Score = (secured_count / 3.0)."

  - id: "full-hardening"
    name: "Full Network Hardening"
    difficulty: "hard"
    max_steps: 15
    grader:
      type: "deterministic"
      description: "Grader evaluates 100% compliance. All 5 servers must be private and encrypted. Final score is (secured_count / 5.0)."